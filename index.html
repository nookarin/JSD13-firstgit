<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Cats</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 2rem;
            background: #fdf6f0;
        }
        img {
            max-width: 600px;
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            margin: 1rem 0;
        }
        button {
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            background: #e07c3c;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #c96a2e;
        }
    </style>
</head>
<body>
    <h1>Random Cat Pictures</h1>
    <img id="cat" src="" alt="Random cat">
    <br>
    <button onclick="newCat()">Show me another cat!</button>

    <script>
        async function newCat() {
            const img = document.getElementById('cat');
            img.src = '';
            try {
                const res = await fetch('https://api.thecatapi.com/v1/images/search');
                const data = await res.json();
                img.src = data[0].url;
            } catch {
                img.alt = 'Failed to load cat :(';
            }
        }
        newCat();
    </script>
</body>
</html>
