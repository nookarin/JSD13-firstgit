<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Cats</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', system-ui, sans-serif;
            text-align: center;
            padding: 2rem;
            background: repeating-linear-gradient(
                45deg,
                #ffe4e1 0px, #ffe4e1 20px,
                #fff0e6 20px, #fff0e6 40px
            );
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 2rem;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 3px solid #ffb6c1;
        }
        h1 {
            color: #5a3e2b;
            font-size: 2.5rem;
            margin-top: 0;
        }
        .paw {
            display: inline-block;
            font-size: 1.5rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        img {
            max-width: 600px;
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            margin: 1rem 0;
            border: 4px solid #ffb6c1;
        }
        button {
            padding: 0.75rem 2rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: #ff9eb5;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #d47a8e;
            transition: all 0.1s ease;
        }
        button:hover {
            background: #ff8aa8;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #d47a8e;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="paw">🐾</span> Random Cat Pictures <span class="paw">🐾</span></h1>
        <img id="cat" src="" alt="Random cat">
        <br>
        <button onclick="newCat()">Show me another cat!</button>
    </div>

    <script>
        async function newCat() {
            const img = document.getElementById('cat');
            img.src = '';
            try {
                const res = await fetch('https://api.thecatapi.com/v1/images/search');
                const data = await res.json();
                img.src = data[0].url;
            } catch {
                img.alt = 'Failed to load cat :(';
            }
        }
        newCat();
    </script>
</body>
</html>
